services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
      - "10002:10002" # Table
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck

  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 5
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "-k",
          "https://localhost:8081/_explorer/emulator.pem",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  servicebus-emulator:
    container_name: servicebus-emulator
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "TicketFlow_Dev123!"
      ACCEPT_EULA: "Y"
      SQL_WAIT_INTERVAL: 15
      EMULATOR_HTTP_PORT: 5300
    volumes:
      - ./emulators/servicebus/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    depends_on:
      - sqledge

  sqledge:
    container_name: sqledge
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TicketFlow_Dev123!"
