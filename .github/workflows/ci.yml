name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TicketFlow.sln

      - name: Build
        run: dotnet build TicketFlow.sln --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test TicketFlow.sln --no-build --configuration Release --filter "Category!=Integration"
