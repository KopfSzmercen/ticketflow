name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow manual deploys to any environment from the Actions tab.
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options: [dev, stage, prod]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TicketFlow.sln

      - name: Build
        run: dotnet build TicketFlow.sln --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test TicketFlow.sln --no-build --configuration Release --filter "Category!=Integration"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')

    env:
      TARGET_ENV: ${{ inputs.environment || 'dev' }}

    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Passwordless login — each GitHub Environment holds its own
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          az deployment sub create \
            --name "${{ env.TARGET_ENV }}-${{ github.run_number }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/${{ env.TARGET_ENV }}.bicepparam

      - name: Publish Function App
        run: |
          dotnet publish src/TicketFlow.Functions/TicketFlow.Functions.csproj \
            --configuration Release \
            --output ./publish

      - name: Deploy Function App
        run: |
          cd publish && zip -r ../function.zip . && cd ..
          az functionapp deployment source config-zip \
            --resource-group "rg-${{ vars.APP_NAME }}-${{ env.TARGET_ENV }}" \
            --name "func-${{ vars.APP_NAME }}-${{ env.TARGET_ENV }}" \
            --src function.zip
